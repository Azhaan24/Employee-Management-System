<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Add Employee</h3>
                </div>

                <div class="card-body">
                    <form th:action="@{/employees}"
                          th:object="${employee}"
                          method="post"
                          enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">
                                Profile Picture
                            </label>
                            <input type="file"
                                   name="image"
                                   class="form-control">
                        </div>


                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text"
                                   th:field="*{firstName}"
                                   class="form-control">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('firstName')}"
                                 th:errors="*{firstName}">
                            </div>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text"
                                   th:field="*{lastName}"
                                   class="form-control">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('lastName')}"
                                 th:errors="*{lastName}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   th:field="*{phone}"
                                   class="form-control">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('phone')}"
                                 th:errors="*{phone}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <input type="text"
                                   th:field="*{department}"
                                   class="form-control">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('department')}"
                                 th:errors="*{department}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Salary</label>
                            <input type="number"
                                   step="0.01"
                                   th:field="*{salary}"
                                   class="form-control">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('salary')}"
                                 th:errors="*{salary}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Joining Date</label>
                            <input type="date"
                                   th:field="*{joiningDate}"
                                   class="form-control">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('joiningDate')}"
                                 th:errors="*{joiningDate}">
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{active}"
                                   id="active">

                            <label class="form-check-label" for="active">Active Employee</label>
                        </div>

                        <button type="submit" class="btn btn-success">Save Employee</button>
                        <a th:href="@{/employees}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
