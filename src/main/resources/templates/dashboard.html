<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">Employee Management System</a>

        <div>
            <a th:href="@{/employees}" class="btn btn-outline-light me-2">Employees</a>
            <a th:href="@{/employees/new}" class="btn btn-success me-2">Add Employee</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-danger">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Employee Dashboard</h2>

    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="card shadow">
                <div class="card-body text-center">

                    <h6>Total Employees</h6>
                    <h2 th:text="${totalEmployees}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h6>Departments</h6>
                    <h2 th:text="${departmentCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h6>Average Salary</h6>
                    <h2>₹<span th:text="${averageSalary}"></span></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h6>Joined This Month</h6>
                    <h2 th:text="${newEmployees}"></h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow">
                <div class="card-header">
                    Employees by Department
                </div>
                <div class="card-body">
                    <canvas id="departmentChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card shadow">
                <div class="card-header">
                    Department Distribution
                </div>
                <div class="card-body">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow mt-4">
        <div class="card-header">
            Recent Employees
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Joining Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(recentEmployees)}">
                    <td colspan="5" class="text-center">
                        No Employees Found
                    </td>
                </tr>

                <tr th:each="employee : ${recentEmployees}">
                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.firstName + ' ' + employee.lastName}"></td>
                    <td th:text="${employee.email}"></td>
                    <td th:text="${employee.department}"></td>
                    <td th:text="${employee.joiningDate}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/employees}" class="btn btn-primary">Employee List</a>
        <a th:href="@{/employees/new}" class="btn btn-success">Add Employee</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    fetch("/api/dashboard/department-stats")
        .then(response => response.json())
        .then(stats => {
            const departments = [];
            const totals = [];
            stats.forEach(item => {
                departments.push(item.department);
                totals.push(item.totalEmployees);
            });

            new Chart(document.getElementById("departmentChart"), {
                type: "bar",
                data: {
                    labels: departments,
                    datasets: [{
                        label: "Employees",
                        data: totals
                    }]
                }
            });

            new Chart(document.getElementById("pieChart"), {
                type: "pie",
                data: {
                    labels: departments,
                    datasets: [{
                        data: totals
                    }]
                }
            });
        }).catch(error => {console.error(error);
        });
</script>
</body>
</html>
