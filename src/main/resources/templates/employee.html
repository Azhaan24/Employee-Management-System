<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }
        .navbar-brand{
            font-weight:bold;
        }
        .table img{
            object-fit:cover;
        }
        .card{
            border:none;
            border-radius:12px;
        }
        .btn{
            border-radius:8px;
        }

    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">Employee Management System</a>
        <div>
            <a class="btn btn-outline-light me-2"
               th:href="@{/dashboard}">
                Dashboard
            </a>

            <form th:action="@{/logout}"
                  method="post"
                  class="d-inline">
                <button class="btn btn-danger">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Employees</h2>
        <div>
            <a th:href="@{/employees/new}" class="btn btn-primary">Add Employee</a>
            <a th:href="@{/employees/export/excel}"
               class="btn btn-success">Export Excel</a>
            <a th:href="@{/employees/export/pdf}" class="btn btn-danger">Export PDF</a>
        </div>
    </div>

    <form th:action="@{/employees}"
          method="get"
          class="row mb-3">
        <div class="col-md-4">
            <input
                    type="text"
                    class="form-control"
                    name="keyword"
                    th:value="${keyword}"
                    placeholder="Search employee...">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Search</button>
        </div>

        <div class="col-md-2">
            <a th:href="@{/employees}" class="btn btn-secondary w-100">Reset</a>
        </div>
    </form>

    <div class="card shadow">
        <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Photo</th>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Joining Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${employeePage.totalElements==0}">
                    <td colspan="11" class="text-center">No Employees Found</td>
                </tr>
                <tr th:each="employee : ${employeePage.content}">
                    <td>
                        <img
                                th:src="@{'/uploads/' + ${employee.imageName}}"
                                width="60"
                                height="60"
                                class="rounded-circle border">
                    </td>

                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.firstName}"></td>
                    <td th:text="${employee.lastName}"></td>
                    <td th:text="${employee.email}"></td>
                    <td th:text="${employee.phone}"></td>
                    <td th:text="${employee.department}"></td>
                    <td th:text="${employee.salary}"></td>
                    <td th:text="${employee.joiningDate}"></td>

                    <td>
                        <span class="badge bg-success" th:if="${employee.active}">Active</span>

                        <span class="badge bg-danger" th:unless="${employee.active}">Inactive</span>
                    </td>

                    <td>
                        <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/employees/delete/{id}(id=${employee.id})}" class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this employee?')">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" th:if="${employeePage.totalPages>1}">
        <ul class="pagination justify-content-center">
            <li class="page-item"
                th:classappend="${employeePage.first}? 'disabled'">
                <a class="page-link" th:href="@{/employees(page=${employeePage.number-1},keyword=${keyword})}">Previous</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0,employeePage.totalPages-1)}" th:classappend="${i==employeePage.number}?'active'">
                <a class="page-link" th:text="${i+1}"
                   th:href="@{/employees(page=${i},keyword=${keyword})}">

                </a>

            </li>

            <li class="page-item" th:classappend="${employeePage.last}? 'disabled'">
                <a class="page-link" th:href="@{/employees(page=${employeePage.number+1},keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
